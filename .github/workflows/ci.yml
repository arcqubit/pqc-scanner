name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --verbose

      - name: Run clippy
        run: cargo clippy -- -D warnings
        if: matrix.rust == 'stable'

      - name: Check formatting
        run: cargo fmt -- --check
        if: matrix.rust == 'stable'

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (bundler)
        run: wasm-pack build --target bundler --out-dir pkg

      - name: Build WASM (nodejs)
        run: wasm-pack build --target nodejs --out-dir pkg-nodejs

      - name: Build WASM (web)
        run: wasm-pack build --target web --out-dir pkg-web

      - name: Check WASM size
        run: |
          ls -lh pkg/*.wasm || true
          if [ -f pkg/pqc_scanner_bg.wasm ]; then
            SIZE=$(stat -c%s pkg/pqc_scanner_bg.wasm 2>/dev/null || stat -f%z pkg/pqc_scanner_bg.wasm 2>/dev/null || echo "0")
            echo "WASM size: $SIZE bytes"
            if [ "$SIZE" -gt 524288 ]; then
              echo "Warning: WASM bundle exceeds 512KB target"
            fi
          else
            echo "WASM files not found, checking for alternative naming..."
            ls -lh pkg/
          fi

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run benchmarks
        run: cargo bench --no-fail-fast || echo "Benchmarks skipped"

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin || echo "Tarpaulin installation skipped"

      - name: Generate coverage
        run: cargo tarpaulin --out Xml --output-dir coverage || echo "Coverage generation skipped"

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false
