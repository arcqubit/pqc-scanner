name: Publish to NPM

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.2.0)'
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for NPM provenance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: |
          cargo test --all-features
          cargo clippy -- -D warnings

      - name: Build WASM (all targets)
        run: |
          npm run build:release

      - name: Optimize WASM binaries
        run: |
          # Install wasm-opt if not available
          which wasm-opt || npm install -g wasm-opt

          # Optimize each target
          wasm-opt -Oz -o pkg/rust_wasm_app_bg.wasm pkg/rust_wasm_app_bg.wasm
          wasm-opt -Oz -o pkg-nodejs/rust_wasm_app_bg.wasm pkg-nodejs/rust_wasm_app_bg.wasm
          wasm-opt -Oz -o pkg-web/rust_wasm_app_bg.wasm pkg-web/rust_wasm_app_bg.wasm

      - name: Verify package contents
        run: |
          npm pack --dry-run
          ls -lh pkg/*.wasm pkg-nodejs/*.wasm pkg-web/*.wasm

      - name: Publish to NPM (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release assets
        if: github.event_name == 'release'
        run: |
          tar -czf pqc-scanner-${{ github.ref_name }}.tar.gz pkg/ pkg-nodejs/ pkg-web/

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./pqc-scanner-${{ github.ref_name }}.tar.gz
          asset_name: pqc-scanner-${{ github.ref_name }}.tar.gz
          asset_content_type: application/gzip
